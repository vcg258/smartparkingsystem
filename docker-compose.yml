services:

  mariadb:
    image: mariadb:11.4
    container_name: mariadb
    restart: always
    ports:
      - 3306:3306
    environment:
      MYSQL_ROOT_PASSWORD: 4165
      MYSQL_DATABASE: smart_parking_system
      MYSQL_USER: system_user
      MYSQL_PASSWORD: 0220
    volumes:
      - ./db_data:/var/lib/mysql

  webserver:
    container_name: webserver
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - 80:8080
    environment:
      DB_HOST: mariadb
    depends_on:
      - mariadb
    restart: always